volumes:
  mssql-data:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_dev

    platform: linux/amd64
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-YourStrong!Pass}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "YourStrong!Pass",
          "-Q",
          "SELECT 1",
          "-b",
          "-C",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
